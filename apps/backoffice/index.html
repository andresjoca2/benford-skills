<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clo · Backoffice</title>
<style>
  :root{
    --bg:        #FAFAFA;
    --panel:     #FFFFFF;
    --panel-2:   #F6F6F7;
    --panel-3:   #F1F1F2;
    --hover:     #F4F4F5;
    --border:    #ECECEE;
    --border-2:  #E4E4E7;
    --border-3:  #D4D4D8;
    --fg:        #09090B;
    --fg-1:      #18181B;
    --fg-2:      #52525B;
    --fg-3:      #71717A;
    --fg-4:      #A1A1AA;
    --fg-5:      #D4D4D8;
    --accent:    #5E6AD2;
    --accent-fg: #FFFFFF;
    --accent-soft: #EEF0FC;
    --accent-soft-fg: #4F5AC2;
    --accent-ring: rgba(94,106,210,0.18);
    --warn:      #B45309;
    --warn-soft: #FEF3C7;
    --ok:        #15803D;
    --ok-soft:   #DCFCE7;
    --info:      #1D4ED8;
    --info-soft: #DBEAFE;
    --danger:    #B91C1C;
    --danger-soft:#FEE2E2;
    --r-1: 4px; --r-2: 6px; --r-3: 8px; --r-4: 10px; --r-5: 14px;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --serif: Georgia, "Times New Roman", serif;
  }

  *{ box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body{
    font-family: var(--sans);
    background: var(--bg);
    color: var(--fg);
    font-feature-settings: "ss01","cv11","cv02";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-size: 14px;
    line-height: 1.45;
    letter-spacing: -0.005em;
  }
  button{ font-family: inherit; cursor: pointer; }
  a{ color: inherit; text-decoration: none; }
  ::selection{ background: var(--accent-soft); color: var(--accent-soft-fg); }

  /* App grid */
  .app{
    display: grid;
    grid-template-columns: 248px 1fr;
    min-height: 100vh;
    background: var(--bg);
  }

  /* ===================== SIDEBAR ===================== */
  .sidebar{
    border-right: 1px solid var(--border);
    background: var(--bg);
    display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh;
  }
  .brand{
    display: flex; align-items: center; gap: 10px;
    padding: 16px 16px 14px;
    border-bottom: 1px solid var(--border);
  }
  .brand-mark{
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--fg); color: #fff;
    display: grid; place-items: center;
    font-family: var(--serif); font-size: 17px; font-style: italic;
    letter-spacing: -0.02em; line-height: 1;
  }
  .brand-name{ font-weight: 600; font-size: 13.5px; letter-spacing: -0.01em; color: var(--fg); }
  .brand-sub{ font-size: 11px; color: var(--fg-3); font-family: var(--mono); }
  .brand-chevron{ margin-left: auto; color: var(--fg-4); }

  .workspace-switch{
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: var(--r-3);
    background: var(--panel);
    cursor: pointer;
  }
  .workspace-switch:hover{ background: var(--hover); }
  .ws-avatar{
    width: 22px; height: 22px; border-radius: 5px;
    background: linear-gradient(135deg,#0EA5E9,#6366F1);
    color: #fff;
    display: grid; place-items: center;
    font-size: 11px; font-weight: 600;
  }
  .ws-name{ font-size: 13px; font-weight: 500; }
  .ws-plan{ font-size: 11px; color: var(--fg-3); font-family: var(--mono); margin-left: auto; }

  .nav{ padding: 8px 8px 16px; overflow-y: auto; flex: 1; }
  .nav-section{ margin-top: 14px; }
  .nav-section:first-child{ margin-top: 6px; }
  .nav-section-title{
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--fg-4);
    padding: 6px 10px 4px;
    font-weight: 500;
  }
  .nav-section-title .badge-soon{
    font-family: var(--mono); font-size: 9.5px;
    color: var(--fg-4);
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 1px 5px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .nav-item{
    display: flex; align-items: center; gap: 9px;
    padding: 6px 10px;
    border-radius: var(--r-2);
    color: var(--fg-2);
    font-size: 13px; font-weight: 450;
    cursor: pointer; user-select: none;
    margin: 1px 0; line-height: 1.2;
  }
  .nav-item:hover{ background: var(--hover); color: var(--fg); }
  .nav-item.active{
    background: var(--panel); color: var(--fg);
    box-shadow: 0 0 0 1px var(--border-2), 0 1px 1px rgba(0,0,0,0.02);
    font-weight: 500;
  }
  .nav-item.disabled{ color: var(--fg-4); cursor: not-allowed; }
  .nav-item.disabled:hover{ background: transparent; color: var(--fg-4); }
  .nav-item .ic{ width: 16px; height: 16px; opacity: 0.9; flex: 0 0 16px; }
  .nav-item.active .ic{ color: var(--accent); opacity: 1; }
  .nav-count{
    margin-left: auto;
    font-family: var(--mono); font-size: 10.5px;
    color: var(--fg-4);
    padding: 1px 6px; border-radius: 4px;
  }
  .nav-item.active .nav-count{ background: var(--panel-2); color: var(--fg-2); }
  .nav-sub{
    margin-left: 24px;
    border-left: 1px solid var(--border);
    padding-left: 6px;
    margin-top: 2px; margin-bottom: 4px;
  }
  .nav-sub .nav-item{
    font-size: 12.5px;
    padding: 5px 8px;
    color: var(--fg-3);
  }
  .nav-sub .nav-item.active{ color: var(--fg); background: var(--panel); }

  .sidebar-foot{
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .user-avatar{
    width: 26px; height: 26px; border-radius: 50%;
    background: linear-gradient(135deg,#F472B6,#A855F7);
    color: #fff; display: grid; place-items: center;
    font-size: 11px; font-weight: 600;
  }
  .user-name{ font-size: 12.5px; font-weight: 500; }
  .user-email{ font-size: 11px; color: var(--fg-3); font-family: var(--mono); }
  .icon-btn{
    background: transparent; border: none;
    width: 26px; height: 26px;
    display: grid; place-items: center;
    border-radius: var(--r-2);
    color: var(--fg-3);
  }
  .icon-btn:hover{ background: var(--hover); color: var(--fg); }

  /* ===================== MAIN ===================== */
  .main{ display: flex; flex-direction: column; min-width: 0; }
  .topbar{
    height: 44px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 20px; gap: 12px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 5;
    backdrop-filter: saturate(180%) blur(6px);
  }
  .crumbs{
    display: flex; align-items: center; gap: 7px;
    font-size: 12.5px; color: var(--fg-3);
  }
  .crumbs .sep{ color: var(--fg-5); }
  .crumbs .here{ color: var(--fg); font-weight: 500; }
  .top-right{ margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .kbd{
    font-family: var(--mono); font-size: 10.5px;
    color: var(--fg-3);
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    padding: 1px 5px; border-radius: 4px;
    line-height: 1;
  }
  .search-pill{
    display: flex; align-items: center; gap: 8px;
    height: 28px;
    padding: 0 8px 0 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--r-2);
    color: var(--fg-3); font-size: 12px;
    cursor: pointer; min-width: 240px;
  }
  .search-pill:hover{ background: var(--hover); }
  .search-pill .kbd{ margin-left: auto; }

  .ghost-btn{
    height: 28px; padding: 0 10px;
    border-radius: var(--r-2);
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fg-1);
    font-size: 12.5px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ghost-btn:hover{ background: var(--hover); }
  .ghost-btn .ic{ width: 14px; height: 14px; }
  .ghost-btn.lg{ height: 32px; padding: 0 14px; font-size: 13px; border-radius: var(--r-3); }
  .ghost-btn.sm{ height: 24px; padding: 0 8px; font-size: 11.5px; border-radius: var(--r-1); }

  .primary-btn{
    height: 28px; padding: 0 11px;
    border-radius: var(--r-2);
    border: 1px solid var(--fg);
    background: var(--fg);
    color: #fff;
    font-size: 12.5px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 1px 2px rgba(0,0,0,0.1);
  }
  .primary-btn:hover{ background: #1f1f23; }
  .primary-btn.lg{ height: 32px; padding: 0 14px; font-size: 13px; border-radius: var(--r-3); }

  /* ===================== PAGE ===================== */
  .page{
    padding: 22px 28px 80px;
    max-width: 1280px; width: 100%; margin: 0 auto;
  }
  .page-head{
    display: flex; align-items: flex-start; gap: 16px;
    margin-bottom: 22px;
  }
  .page-eyebrow{
    font-size: 11px; font-family: var(--mono);
    color: var(--fg-3);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .page-title{
    font-size: 24px; font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--fg); margin: 0;
    line-height: 1.15;
  }
  .page-sub{
    color: var(--fg-3); font-size: 13.5px;
    margin-top: 6px; max-width: 620px;
  }
  .page-head .actions{
    margin-left: auto;
    display: flex; align-items: center; gap: 8px;
  }

  /* Stepper */
  .stepper{
    display: flex; align-items: stretch; gap: 0;
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: var(--r-3);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .step{
    flex: 1; padding: 10px 14px;
    border-right: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    position: relative;
    background: var(--panel);
    min-width: 0;
  }
  .step:last-child{ border-right: none; }
  .step:hover{ background: var(--hover); }
  .step.active{ background: var(--bg); }
  .step.active::after{
    content:""; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px;
    background: var(--fg);
  }
  .step-num{
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--panel-2); color: var(--fg-3);
    font-family: var(--mono); font-size: 10.5px;
    display: grid; place-items: center;
    border: 1px solid var(--border-2);
    flex: 0 0 20px;
  }
  .step.done .step-num, .step.active .step-num{
    background: var(--fg); color: #fff; border-color: var(--fg);
  }
  .step-label{
    font-size: 13px; font-weight: 500;
    color: var(--fg-2); line-height: 1.1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .step.active .step-label{ color: var(--fg); }
  .step.done .step-label{ color: var(--fg-2); }
  .step-meta{
    font-size: 11px; color: var(--fg-4);
    font-family: var(--mono); line-height: 1;
    margin-top: 3px;
  }
  .step-text{ min-width: 0; }

  /* Section card */
  .card{
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: var(--r-4);
    overflow: hidden;
  }
  .card-head{
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .card-title{ font-size: 14px; font-weight: 600; letter-spacing: -0.005em; }
  .card-sub{ font-size: 12px; color: var(--fg-3); }
  .card-actions{ margin-left: auto; display: flex; align-items: center; gap: 6px; }

  /* Toolbar */
  .toolbar{
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .chip{
    display: inline-flex; align-items: center; gap: 6px;
    height: 26px; padding: 0 8px;
    border-radius: var(--r-2);
    border: 1px dashed var(--border-3);
    color: var(--fg-2);
    font-size: 12px; background: transparent;
  }
  .chip:hover{ background: var(--hover); color: var(--fg); }
  .chip.solid{
    border-style: solid;
    background: var(--panel);
    border-color: var(--border-2);
  }
  .chip.active{
    background: var(--fg); color: #fff; border-color: var(--fg);
  }
  .chip .ic{ width: 12px; height: 12px; color: var(--fg-3); }
  .chip.active .ic{ color: #fff; }
  .chip strong{ font-weight: 500; color: var(--fg); }
  .chip.active strong{ color: #fff; }
  .chip em{ color: var(--fg-3); font-style: normal; }
  .chip.active em{ color: rgba(255,255,255,0.6); }

  /* Tabs (inline) */
  .tabs{
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    background: var(--panel);
  }
  .tab{
    padding: 10px 12px;
    font-size: 13px; color: var(--fg-3); font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tab:hover{ color: var(--fg-1); }
  .tab.active{ color: var(--fg); border-bottom-color: var(--fg); }
  .tab .tab-count{
    font-family: var(--mono); font-size: 10.5px;
    background: var(--panel-2); border: 1px solid var(--border);
    padding: 0 5px; border-radius: 999px;
    color: var(--fg-3);
    line-height: 1.6;
  }

  /* Table */
  table.dt{
    width: 100%;
    border-collapse: collapse;
  }
  table.dt th{
    text-align: left;
    font-size: 11px; color: var(--fg-3);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 500; font-family: var(--mono);
    padding: 9px 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: relative;
    white-space: nowrap;
  }
  table.dt td{
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--fg-1);
    vertical-align: middle;
  }
  table.dt tr:last-child td{ border-bottom: none; }
  table.dt tbody tr{ cursor: pointer; }
  table.dt tbody tr:hover{ background: var(--hover); }
  table.dt tbody tr.selected{ background: var(--accent-soft); }
  .row-title{
    font-weight: 500; color: var(--fg);
    display: flex; align-items: center; gap: 8px;
  }
  .row-sub{
    font-size: 11.5px; color: var(--fg-3);
    font-family: var(--mono);
    margin-top: 2px;
  }
  .mono{ font-family: var(--mono); }
  .num{ font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .right{ text-align: right; }
  .col-check{ width: 24px; padding-right: 0 !important; }
  .col-actions{ width: 36px; }

  /* Checkbox */
  .cbx{
    width: 14px; height: 14px;
    border: 1.5px solid var(--border-3);
    border-radius: 3px;
    background: var(--panel);
    display: inline-grid; place-items: center;
    cursor: pointer;
  }
  .cbx.on{
    background: var(--fg); border-color: var(--fg); color: #fff;
  }

  /* Status pill */
  .pill{
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11.5px; font-weight: 500;
    padding: 2px 8px 2px 7px;
    border-radius: 999px;
    background: var(--panel-2);
    color: var(--fg-2);
    border: 1px solid var(--border-2);
    line-height: 1.5;
    white-space: nowrap;
  }
  .pill .dot{
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--fg-4);
  }
  .pill.running{ background: var(--info-soft); color: var(--info); border-color: transparent; }
  .pill.running .dot{ background: var(--info); box-shadow: 0 0 0 3px rgba(29,78,216,0.18); animation: pulse 1.6s infinite; }
  .pill.done{ background: var(--ok-soft); color: var(--ok); border-color: transparent; }
  .pill.done .dot{ background: var(--ok); }
  .pill.empty{ background: var(--warn-soft); color: var(--warn); border-color: transparent; }
  .pill.empty .dot{ background: var(--warn); }
  .pill.draft{ background: var(--panel-2); color: var(--fg-2); }
  .pill.draft .dot{ background: var(--fg-4); }
  .pill.warn{ background: var(--warn-soft); color: var(--warn); border-color: transparent; }
  .pill.warn .dot{ background: var(--warn); }
  .pill.danger{ background: var(--danger-soft); color: var(--danger); border-color: transparent; }
  .pill.danger .dot{ background: var(--danger); }

  @keyframes pulse {
    0%,100%{ opacity: 1; }
    50%{ opacity: 0.4; }
  }

  /* Progress mini-bar */
  .mini-bar{
    width: 88px; height: 4px;
    background: var(--panel-3);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 5px;
  }
  .mini-bar > span{
    display: block; height: 100%;
    background: var(--fg);
    border-radius: 999px;
  }
  .mini-bar.warn > span{ background: var(--warn); }
  .mini-bar.ok > span{ background: var(--ok); }
  .mini-bar.info > span{ background: var(--info); }

  /* Score bar */
  .score{
    display: flex; align-items: center; gap: 8px;
  }
  .score-bar{
    width: 60px; height: 4px;
    background: var(--panel-3);
    border-radius: 999px; overflow: hidden;
  }
  .score-bar > span{
    display: block; height: 100%;
    background: var(--fg);
    border-radius: 999px;
  }
  .score-bar.hot > span{ background: linear-gradient(90deg,#16A34A,#15803D); }
  .score-bar.warm > span{ background: #5E6AD2; }
  .score-bar.cold > span{ background: var(--fg-4); }
  .score-num{ font-family: var(--mono); font-size: 11.5px; color: var(--fg-2); }

  /* Page footer */
  .page-foot{
    margin-top: 20px;
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: var(--r-3);
  }
  .page-foot .hint{
    font-size: 12.5px; color: var(--fg-3);
    display: flex; align-items: center; gap: 8px;
  }
  .page-foot .spacer{ flex: 1; }

  /* Avatars */
  .avatar{
    width: 24px; height: 24px;
    border-radius: 50%;
    display: inline-grid; place-items: center;
    font-size: 10.5px; font-weight: 600;
    color: #fff; flex: 0 0 24px;
    letter-spacing: 0;
  }
  .avatar.sq{ border-radius: 6px; }
  .avatar.lg{ width: 32px; height: 32px; font-size: 12px; }
  .avatar.xl{ width: 40px; height: 40px; font-size: 14px; border-radius: 8px; }

  /* Logo tile (company) */
  .logo-tile{
    width: 28px; height: 28px;
    border-radius: 6px;
    display: inline-grid; place-items: center;
    font-family: var(--serif); font-size: 14px; font-weight: 500;
    color: #fff;
    flex: 0 0 28px;
    background: var(--fg-3);
    letter-spacing: -0.01em;
  }
  .logo-tile.lg{ width: 40px; height: 40px; font-size: 18px; }

  /* Tag */
  .tag{
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500;
    padding: 1px 7px 2px;
    border-radius: 4px;
    background: var(--panel-2);
    color: var(--fg-2);
    border: 1px solid var(--border-2);
    line-height: 1.45;
    white-space: nowrap;
  }

  /* Channel icons row */
  .channels{
    display: inline-flex; gap: 4px;
    color: var(--fg-4);
  }
  .channels .ch{
    width: 22px; height: 22px;
    border-radius: 4px;
    background: var(--panel-2);
    display: grid; place-items: center;
    color: var(--fg-3);
  }
  .channels .ch.on{ background: var(--fg); color: #fff; }
  .channels .ch.warn{ background: var(--warn-soft); color: var(--warn); }

  /* Split layout: list + detail */
  .split{
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    gap: 16px;
    align-items: start;
  }
  .split .card{ min-width: 0; }
  .split-detail{ position: sticky; top: 60px; }

  /* Detail panel */
  .detail-head{
    padding: 18px 18px 14px;
    border-bottom: 1px solid var(--border);
  }
  .detail-eyebrow{
    font-size: 11px; font-family: var(--mono);
    color: var(--fg-3);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .detail-title{
    font-size: 18px; font-weight: 600;
    letter-spacing: -0.015em;
    color: var(--fg); margin: 0;
    line-height: 1.2;
  }
  .detail-meta{
    display: flex; align-items: center; gap: 10px;
    margin-top: 8px;
    color: var(--fg-3); font-size: 12px;
  }
  .detail-meta .sep{ color: var(--fg-5); }

  .detail-body{ padding: 14px 18px; }
  .detail-section{
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .detail-section:last-child{ border-bottom: none; }
  .detail-label{
    font-size: 11px; color: var(--fg-3);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-family: var(--mono); font-weight: 500;
    margin-bottom: 8px;
  }
  .kv{
    display: grid; grid-template-columns: 110px 1fr;
    gap: 4px 12px;
    font-size: 12.5px;
  }
  .kv .k{ color: var(--fg-3); }
  .kv .v{ color: var(--fg-1); }

  /* Stat row */
  .stat-row{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--border);
  }
  .stat-cell{
    padding: 12px 14px;
    border-right: 1px solid var(--border);
  }
  .stat-cell:last-child{ border-right: none; }
  .stat-cell .lbl{
    font-size: 10.5px; color: var(--fg-3);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-family: var(--mono);
  }
  .stat-cell .val{
    font-size: 18px; font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--fg);
    margin-top: 3px;
    font-variant-numeric: tabular-nums;
  }
  .stat-cell .val .unit{ font-size: 11px; color: var(--fg-3); font-family: var(--mono); font-weight: 500; margin-left: 2px;}

  /* Timeline */
  .timeline{ padding: 4px 0; }
  .tl-item{
    display: grid;
    grid-template-columns: 20px 1fr auto;
    gap: 10px;
    padding: 9px 16px;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
  }
  .tl-item:last-child{ border-bottom: none; }
  .tl-dot{
    width: 6px; height: 6px; margin-top: 7px;
    border-radius: 50%; background: var(--fg-4);
    box-shadow: 0 0 0 3px var(--panel-2);
  }
  .tl-dot.ok{ background: var(--ok); box-shadow: 0 0 0 3px var(--ok-soft); }
  .tl-dot.info{ background: var(--info); box-shadow: 0 0 0 3px var(--info-soft); }
  .tl-dot.warn{ background: var(--warn); box-shadow: 0 0 0 3px var(--warn-soft); }
  .tl-dot.danger{ background: var(--danger); box-shadow: 0 0 0 3px var(--danger-soft); }
  .tl-text{ font-size: 12.5px; color: var(--fg-1); }
  .tl-text b{ font-weight: 500; }
  .tl-text .muted{ color: var(--fg-3); }
  .tl-time{
    font-size: 11px; font-family: var(--mono);
    color: var(--fg-4); white-space: nowrap;
    margin-top: 1px;
  }

  /* Day divider (eventos) */
  .day-row td{
    background: var(--bg);
    padding: 8px 14px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--fg-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
  }

  /* Event entity chip (within event text) */
  .entity{
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0 5px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-1);
    line-height: 1.55;
    vertical-align: 1px;
  }
  .entity .ic{ width: 11px; height: 11px; color: var(--fg-3); }

  /* Pagination */
  .pagination{
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    font-size: 12px; color: var(--fg-3);
    font-family: var(--mono);
  }
  .pagination .spacer{ flex: 1; }
  .pg-btn{
    width: 24px; height: 24px;
    display: grid; place-items: center;
    border-radius: var(--r-2);
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fg-2);
  }
  .pg-btn:hover{ background: var(--hover); }
  .pg-btn.disabled{ color: var(--fg-5); cursor: not-allowed; }

  /* Live tail indicator */
  .live{
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: var(--mono);
    color: var(--fg-3);
  }
  .live .pulse{
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--info);
    box-shadow: 0 0 0 3px rgba(29,78,216,0.18);
    animation: pulse 1.6s infinite;
  }

  /* Grid 2 cols for content */
  .grid-2{
    display: grid;
    grid-template-columns: 1.55fr 1fr;
    gap: 18px;
  }

  /* Inline form bits */
  .input{
    width: 100%;
    height: 30px;
    padding: 0 10px;
    border: 1px solid var(--border-2);
    border-radius: var(--r-2);
    background: var(--panel);
    font-family: inherit;
    font-size: 12.5px;
    color: var(--fg);
  }
  .input:focus{ outline: 2px solid var(--accent-ring); border-color: var(--accent); }

  /* Misc helpers */
  .stack{ display: flex; flex-direction: column; gap: 4px; }
  .row{ display: flex; align-items: center; gap: 8px; }
  .gap-12{ gap: 12px; }
  .muted{ color: var(--fg-3); }
  .truncate{ white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  svg{ display: block; }

  /* ===== KPI row ===== */
  .kpi-row{
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
    margin-bottom: 4px;
  }
  .kpi{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--r-2);
    padding: 12px 14px;
  }
  .kpi-lbl{ font-size: 11px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--mono); margin-bottom: 6px; }
  .kpi-val{ font-size: 22px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; }
  .kpi-unit{ font-size: 14px; color: var(--fg-4); font-weight: 500; }
  .kpi-sub{ font-size: 11px; color: var(--fg-4); margin-top: 4px; font-family: var(--mono); }
  .kpi .mini-bar{ margin-top: 8px; }

  .batch-tab-body{ margin-top: 16px; }

  /* ===== Empresas split ===== */
  .empresas-split{ display:grid; grid-template-columns: 340px 1fr; gap:14px; align-items:start; }
  .emp-list{ padding:0; }
  .emp-item{
    display:flex; align-items:flex-start; gap:11px; width:100%;
    padding:12px 14px;
    background:transparent; border:none; border-bottom:1px solid var(--border);
    cursor:pointer; text-align:left; font-family:inherit;
  }
  .emp-item:last-child{ border-bottom:none; }
  .emp-item:hover{ background:var(--hover); }
  .emp-item.selected{ background:var(--hover); box-shadow: inset 3px 0 0 var(--accent); }
  .emp-dot{ display:inline-block; width:6px; height:6px; border-radius:50%; }
  .emp-detail{ padding:0; }

  /* ===== Ángulo ===== */
  .angulo-grid{ display:grid; grid-template-columns: 320px 1fr; gap:14px; align-items:start; }
  .angulo-list{ padding:0; }
  .angulo-item{
    display:block; width:100%;
    padding:12px 16px;
    background:transparent; border:none; border-bottom:1px solid var(--border);
    cursor:pointer; text-align:left; font-family:inherit;
  }
  .angulo-item:last-child{ border-bottom:none; }
  .angulo-item:hover{ background:var(--hover); }
  .angulo-item.selected{ background:var(--hover); box-shadow: inset 3px 0 0 var(--accent); }
  .angulo-detail{ padding:0; }
  .angulo-body{ padding: 18px 22px 22px; display:flex; flex-direction:column; gap:18px; }
  .angulo-metrics{ display:grid; grid-template-columns: repeat(4,1fr); gap:10px; }
  .ang-m{ background:var(--panel-2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
  .ang-m-lbl{ font-size:10px; color:var(--fg-3); font-family:var(--mono); letter-spacing:0.08em; margin-bottom:3px; }
  .ang-m-val{ font-size:18px; font-weight:600; line-height:1.1; letter-spacing:-0.01em; }
  .ang-field{ display:flex; flex-direction:column; gap:6px; min-width:0; }
  .ang-label{ font-size:11px; color:var(--fg-3); font-family:var(--mono); letter-spacing:0.08em; text-transform:uppercase; }
  .ang-text{ font-size:13.5px; line-height:1.55; color:var(--fg-1); }
  .ang-textarea{
    width:100%; min-height:90px; padding:10px 12px;
    background:var(--panel); border:1px solid var(--border-2); border-radius:8px;
    font:inherit; font-size:13.5px; line-height:1.55; color:var(--fg); resize:vertical; outline:none;
  }
  .ang-textarea:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); }
  .ang-row{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
  .ang-divider{ height:1px; background:var(--border); margin: 2px 0; }

  /* ===== Brain (Document Tracker) ===== */
  .brain-head{ display:flex; align-items:flex-start; gap:16px; padding-bottom:16px; border-bottom:1px solid var(--border); margin-bottom:16px; }
  .brain-kpis{ display:flex; gap:8px; }
  .bkpi{ background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:8px 16px; min-width:78px; text-align:left; }
  .bkpi-val{ font-size:22px; font-weight:700; line-height:1.1; letter-spacing:-0.02em; }
  .bkpi-lbl{ font-size:10.5px; color:var(--fg-3); font-family:var(--mono); letter-spacing:0.08em; margin-top:2px; }
  .brain-refresh{ display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 14px; border-radius:8px; background:var(--fg); color:var(--bg); border:none; font-size:12.5px; font-weight:500; cursor:pointer; align-self:flex-end; }

  .brain-toggle{ display:inline-flex; padding:4px; background:var(--panel-2); border:1px solid var(--border); border-radius:10px; gap:2px; margin-bottom:14px; }
  .brain-toggle button{ padding:7px 16px; border:none; background:transparent; border-radius:7px; font-size:13px; font-weight:500; color:var(--fg-2); cursor:pointer; font-family:inherit; }
  .brain-toggle button.on{ background:var(--bg); color:var(--fg); border:1px solid var(--border-2); box-shadow:0 1px 2px rgba(0,0,0,0.04); }

  .brain-filterbar{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; padding:10px 14px; border:1px solid var(--border); border-radius:10px; background:var(--panel); margin-bottom:14px; }
  .bf-label{ font-size:10.5px; color:var(--fg-3); font-family:var(--mono); letter-spacing:0.08em; margin-right:4px; }
  .bf-chip{ padding:5px 12px; border-radius:999px; background:var(--bg); border:1px solid var(--border-2); font-size:12px; color:var(--fg-1); cursor:pointer; font-family:inherit; }
  .bf-chip:hover{ background:var(--hover); }
  .bf-chip.on{ background:var(--fg); color:var(--bg); border-color:var(--fg); }
  .bf-check{ display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--fg-2); margin-left:10px; cursor:pointer; }
  .bf-check input{ accent-color:var(--fg); }
  .bf-search{ height:28px; padding:0 12px; border:1px solid var(--border-2); border-radius:999px; background:var(--bg); font:inherit; font-size:12px; min-width:240px; outline:none; color:var(--fg); }
  .bf-search:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-ring); }

  .brain-dt th{ font-size:10.5px; letter-spacing:0.08em; color:var(--fg-3); }
  .brain-type{ display:inline-block; padding:3px 9px; border-radius:6px; font-size:11px; font-weight:600; font-family:var(--mono); letter-spacing:0.04em; }
  .brain-num{ display:inline-grid; place-items:center; min-width:24px; height:22px; padding:0 6px; border-radius:999px; background:var(--panel-2); border:1px solid var(--border); font-size:12px; font-weight:500; font-family:var(--mono); }
  .brain-falla{ display:inline-block; padding:3px 10px; border-radius:6px; background:color-mix(in oklch, var(--danger) 10%, var(--bg)); color:var(--danger); font-size:11.5px; font-family:var(--mono); }
  .brain-pill{ display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:500; }
  .brain-pill .dot{ width:7px; height:7px; border-radius:50%; }
  .brain-pill.ok{ background:color-mix(in oklch, var(--ok) 12%, var(--bg)); color:var(--ok); }
  .brain-pill.ok .dot{ background:var(--ok); }
  .brain-pill.pend{ background:color-mix(in oklch, var(--danger) 10%, var(--bg)); color:var(--danger); }
  .brain-pill.pend .dot{ background:var(--danger); }
  .brain-legend{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:14px 4px 0; font-size:12px; }

  /* Accept / reject buttons */
  .review-btn{
    display: inline-flex; align-items: center; gap: 4px;
    height: 24px; padding: 0 9px;
    border-radius: 6px;
    font-size: 11.5px; font-weight: 500;
    border: 1px solid;
    background: var(--panel);
    cursor: pointer;
    font-family: inherit;
  }
  .review-btn.accept{
    color: var(--ok);
    border-color: color-mix(in oklch, var(--ok) 30%, transparent);
    background: color-mix(in oklch, var(--ok) 8%, var(--bg));
  }
  .review-btn.accept:hover{ background: color-mix(in oklch, var(--ok) 16%, var(--bg)); }
  .review-btn.reject{
    color: var(--danger);
    border-color: color-mix(in oklch, var(--danger) 30%, transparent);
    background: color-mix(in oklch, var(--danger) 8%, var(--bg));
  }
  .review-btn.reject:hover{ background: color-mix(in oklch, var(--danger) 16%, var(--bg)); }
  .review-btn.enrich{
    color: var(--warn);
    border-color: color-mix(in oklch, var(--warn) 34%, transparent);
    background: color-mix(in oklch, var(--warn) 10%, var(--bg));
  }
  .review-btn.enrich:hover{ background: color-mix(in oklch, var(--warn) 18%, var(--bg)); }
  .kv.kv-wide{ grid-template-columns: 160px 1fr; }

  /* ===== Workspace switcher dropdown ===== */
  .ws-wrap{ position: relative; margin: 10px 10px 6px; }
  .workspace-switch{ width: 100%; cursor: pointer; box-sizing: border-box; }
  .workspace-switch.open{ background: var(--hover); border-color: var(--border-3); }
  .ws-menu{
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--panel); border: 1px solid var(--border-2);
    border-radius: var(--r-2);
    box-shadow: 0 10px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    z-index: 50;
    overflow: hidden;
  }
  .ws-menu-head{
    padding: 10px 12px 6px;
    font-size: 10.5px; font-family: var(--mono);
    color: var(--fg-4); text-transform: uppercase; letter-spacing: 0.08em;
  }
  .ws-menu-list{ display: flex; flex-direction: column; padding: 2px; }
  .ws-row{
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 6px;
    background: transparent; border: none; cursor: pointer;
    text-align: left;
  }
  .ws-row:hover{ background: var(--hover); }
  .ws-row.selected{ background: var(--hover); }
  .ws-row .ws-avatar{ width: 26px; height: 26px; border-radius: 6px; font-size: 12px; }
  .ws-row-name{ font-size: 13px; font-weight: 500; color: var(--fg); }
  .ws-row-sub{ font-size: 11.5px; color: var(--fg-3); }
  .ws-menu-foot{
    border-top: 1px solid var(--border);
    padding: 4px;
  }
  .ws-menu-action{
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 8px 10px;
    border-radius: 6px;
    background: transparent; border: none; cursor: pointer;
    font-size: 13px; color: var(--fg-1);
  }
  .ws-menu-action:hover{ background: var(--hover); color: var(--fg); }

  /* ===== Ajustes / workspace list ===== */
  .ws-list{ display: flex; flex-direction: column; }
  .ws-list-row{
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: transparent; border-left: none; border-right: none; border-top: none;
    width: 100%; cursor: default;
  }
  .ws-list-row:last-child{ border-bottom: none; }
  .ws-avatar.lg{ width: 38px; height: 38px; font-size: 16px; border-radius: 9px; flex: 0 0 38px; }
  .ws-list-row.ws-create{ cursor: pointer; }
  .ws-list-row.ws-create:hover{ background: var(--hover); }
  .ws-create-avatar{
    background: var(--panel-2) !important;
    color: var(--fg-2);
    border: 1px dashed var(--border-3);
  }

  /* ===== Modal ===== */
  .modal-overlay{
    position: fixed; inset: 0;
    background: rgba(15,17,21,0.45);
    backdrop-filter: blur(2px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 40px;
  }
  .modal{
    background: var(--bg);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.24);
    width: 100%; max-width: 520px;
    display: flex; flex-direction: column;
    max-height: calc(100vh - 80px);
  }
  .modal-head{
    display: flex; align-items: flex-start; gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title{ font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .modal-sub{ font-size: 12.5px; color: var(--fg-3); margin-top: 2px; }
  .modal-body{
    padding: 18px 20px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 14px;
  }
  .modal-foot{
    display: flex; align-items: center; gap: 8px;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--panel-2);
    border-radius: 0 0 14px 14px;
  }
  .ws-preview{
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .form-row{ display: flex; flex-direction: column; gap: 6px; }
  .form-label{ font-size: 11.5px; color: var(--fg-2); font-weight: 500; }
  .form-input{
    height: 36px; padding: 0 12px;
    background: var(--panel);
    border: 1px solid var(--border-2);
    border-radius: 8px;
    font: inherit; font-size: 13.5px; color: var(--fg);
    outline: none;
  }
  .form-input:focus{ border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-ring); }
  .seg{
    display: inline-flex; padding: 3px;
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 8px; gap: 2px;
  }
  .seg-opt{
    padding: 5px 14px; font-size: 12px; font-weight: 500;
    border-radius: 6px; border: none; background: transparent;
    color: var(--fg-2); cursor: pointer;
    font-family: var(--mono); letter-spacing: 0.04em;
  }
  .seg-opt.on{ background: var(--bg); color: var(--fg); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .swatches{ display: flex; gap: 8px; }
  .swatch{
    width: 28px; height: 28px; border-radius: 8px;
    border: 2px solid transparent; cursor: pointer;
    transition: transform .1s;
  }
  .swatch.on{ border-color: var(--fg); transform: scale(1.08); }
  .opt-cards{ display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .opt-card{
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px;
    background: var(--panel); border: 1px solid var(--border-2);
    border-radius: 10px; cursor: pointer;
  }
  .opt-card.on{ border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); }
  .opt-card svg{ flex-shrink: 0; margin-top: 2px; color: var(--fg-2); }
  .opt-card.on svg{ color: var(--accent); }

  /* ===== Chat (Entrenar agente) ===== */
  .chat-shell{
    display: flex; flex-direction: column;
    height: calc(100vh - 44px);
    max-width: 880px;
    margin: 0 auto;
    width: 100%;
    padding: 0 24px 0;
  }
  .chat-head{
    display: flex; align-items: center; gap: 12px;
    padding: 18px 4px 14px;
    border-bottom: 1px solid var(--border);
  }
  .agent-avatar{ position: relative; }
  .agent-status{
    position: absolute; right: -1px; bottom: -1px;
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--ok); border: 2px solid var(--bg);
  }
  .chat-body{
    flex: 1;
    overflow-y: auto;
    padding: 20px 4px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .msg{ display: flex; gap: 10px; max-width: 100%; }
  .msg-user{ justify-content: flex-end; }
  .msg-user .msg-bubble{
    background: var(--fg); color: #fff;
    border-color: var(--fg);
  }
  .msg-user .msg-name, .msg-user .msg-time{ color: rgba(255,255,255,0.6); }
  .msg-avatar{ flex: 0 0 26px; }
  .msg-bubble{
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    max-width: 640px;
    font-size: 13.5px; line-height: 1.5;
  }
  .msg-meta{
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 4px;
  }
  .msg-name{ font-weight: 600; font-size: 12px; color: var(--fg); }
  .msg-time{ font-size: 11px; color: var(--fg-4); font-family: var(--mono); }
  .msg-text{ color: inherit; }
